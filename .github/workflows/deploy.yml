name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cd-smilo-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cd-smilo-web/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /cdSmiloWeb
          # URL del Apps Script que recibe la inscripción (Settings → Secrets and
          # variables → Actions → New repository secret: REGISTRATION_ENDPOINT).
          # Si no existe, el formulario funciona en modo demo (no envía nada).
          NEXT_PUBLIC_REGISTRATION_ENDPOINT: ${{ secrets.REGISTRATION_ENDPOINT }}

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: cd-smilo-web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
